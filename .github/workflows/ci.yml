name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/meteo_ci
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/meteo_ci
      SESSION_SECRET: ci-only-session-secret-with-at-least-32-characters
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm
      - name: Pin npm
        run: npm install --global npm@10.9.8
      - name: Report toolchain
        run: node --version && npm --version
      - run: npm ci
      - run: npm run db:schema:check
      - run: npm run db:generate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run security:audit
      - run: npm run build
